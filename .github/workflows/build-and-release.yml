name: Build and Release Browser Extensions

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package Extensions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read manifest metadata
        id: manifest
        run: echo "version=$(jq -r '.version' manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Package extensions
        env:
          VERSION: ${{ steps.manifest.outputs.version }}
        run: |
          mkdir -p dist
          FILES="manifest.json content-script.js sfx-core.js sfx-modal.js sfx-api.js sfx-ui.js README.md PRIVACY-POLICY.md"
          zip -r "dist/service-fabric-explorer-helper-${VERSION}-chrome.zip" $FILES
          zip -r "dist/service-fabric-explorer-helper-v${VERSION}.xpi" $FILES

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-packages
          path: |
            dist/*.zip
            dist/*.xpi

      - name: Attach assets to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/service-fabric-explorer-helper-${{ steps.manifest.outputs.version }}-chrome.zip
            dist/service-fabric-explorer-helper-v${{ steps.manifest.outputs.version }}.xpi
