name: Build and Release Browser Extensions

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_stores:
        description: Publish the built packages to Chrome Web Store and Firefox Add-ons
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    name: Package Extensions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve build version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(jq -r '.version' manifest.json)"
          fi

          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Unable to determine extension version."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set manifest version from tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg version "$VERSION" '.version = $version' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Package extensions
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          FILES=(
            manifest.json
            content-script.js
            sfx-core.js
            sfx-modal.js
            sfx-api.js
            sfx-ui.js
            README.md
            PRIVACY-POLICY.md
          )

          PACKAGE_ROOT="$(mktemp -d)"
          cp "${FILES[@]}" "$PACKAGE_ROOT"/

          (
            cd "$PACKAGE_ROOT"
            zip -r "$GITHUB_WORKSPACE/dist/service-fabric-explorer-helper-${VERSION}-chrome.zip" .
            zip -r "$GITHUB_WORKSPACE/dist/service-fabric-explorer-helper-${VERSION}-firefox.zip" .
          )

      - name: Package Firefox source archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          zip -r "dist/service-fabric-explorer-helper-${VERSION}-firefox-source.zip" \
            . \
            -x ".git/*" \
               "dist/*"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-packages
          path: |
            dist/*.zip

      - name: Attach assets to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/service-fabric-explorer-helper-${{ steps.version.outputs.version }}-chrome.zip
            dist/service-fabric-explorer-helper-${{ steps.version.outputs.version }}-firefox.zip
            dist/service-fabric-explorer-helper-${{ steps.version.outputs.version }}-firefox-source.zip

  publish-stores:
    name: Publish to Browser Stores
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/') || inputs.publish_stores == true

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: browser-extension-packages
          path: dist

      - name: Validate browser store secrets
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CHROME_SERVICE_ACCOUNT_EMAIL: ${{ secrets.CHROME_SERVICE_ACCOUNT_EMAIL }}
          CHROME_SERVICE_ACCOUNT_KEY: ${{ secrets.CHROME_SERVICE_ACCOUNT_KEY }}
          FIREFOX_ADDON_ID: ${{ secrets.FIREFOX_ADDON_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
        run: |
          set -euo pipefail

          missing=()
          for secret_name in \
            CHROME_EXTENSION_ID \
            CHROME_PUBLISHER_ID \
            CHROME_SERVICE_ACCOUNT_EMAIL \
            CHROME_SERVICE_ACCOUNT_KEY \
            FIREFOX_ADDON_ID \
            FIREFOX_JWT_ISSUER \
            FIREFOX_JWT_SECRET; do
            if [[ -z "${!secret_name}" ]]; then
              missing+=("$secret_name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub Actions secrets:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - id: chrome-auth
        name: Authenticate Chrome publisher service account
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.CHROME_SERVICE_ACCOUNT_KEY }}
          service_account: ${{ secrets.CHROME_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Publish to Chrome Web Store
        env:
          VERSION: ${{ needs.package.outputs.version }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CHROME_ACCESS_TOKEN: ${{ steps.chrome-auth.outputs.access_token }}
        run: |
          set -euo pipefail

          PACKAGE_PATH="dist/service-fabric-explorer-helper-${VERSION}-chrome.zip"
          CURL_STATUS_FILE="$(mktemp)"
          CURL_BODY_FILE="$(mktemp)"

          chrome_api_request() {
            local method="$1"
            local url="$2"
            shift 2

            local http_code
            http_code="$(
              curl -sS \
                -o "$CURL_BODY_FILE" \
                -w '%{http_code}' \
                -D "$CURL_STATUS_FILE" \
                -H "Authorization: Bearer ${CHROME_ACCESS_TOKEN}" \
                -X "$method" \
                "$@" \
                "$url"
            )"

            if [[ ! "$http_code" =~ ^2 ]]; then
              echo "Chrome Web Store API request failed." >&2
              echo "URL: $url" >&2
              echo "Method: $method" >&2
              echo "HTTP status: $http_code" >&2
              echo "Response headers:" >&2
              sed 's/^/  /' "$CURL_STATUS_FILE" >&2 || true
              echo "Response body:" >&2
              if jq -e . >/dev/null 2>&1 <"$CURL_BODY_FILE"; then
                jq 'del(.publicKey)' "$CURL_BODY_FILE" | sed 's/^/  /' >&2
              else
                sed 's/^/  /' "$CURL_BODY_FILE" >&2 || true
              fi
              exit 1
            fi

            cat "$CURL_BODY_FILE"
          }

          if [[ -z "$CHROME_ACCESS_TOKEN" ]]; then
            echo "Chrome service account authentication did not produce an access token." >&2
            exit 1
          fi

          upload_url="https://chromewebstore.googleapis.com/upload/v2/publishers/${CHROME_PUBLISHER_ID}/items/${CHROME_EXTENSION_ID}:upload"
          status_url="https://chromewebstore.googleapis.com/v2/publishers/${CHROME_PUBLISHER_ID}/items/${CHROME_EXTENSION_ID}:fetchStatus"
          publish_url="https://chromewebstore.googleapis.com/v2/publishers/${CHROME_PUBLISHER_ID}/items/${CHROME_EXTENSION_ID}:publish"

          upload_response="$(chrome_api_request POST "$upload_url" -T "$PACKAGE_PATH")"
          upload_state="$(jq -r '.uploadState // empty' <<<"$upload_response")"
          if [[ "$upload_state" == "FAILURE" || -z "$upload_state" ]]; then
            echo "Chrome upload failed." >&2
            echo "$upload_response" >&2
            exit 1
          fi

          for attempt in {1..12}; do
            if [[ "$upload_state" == "SUCCESS" ]]; then
              break
            fi

            sleep 10
            status_response="$(chrome_api_request GET "$status_url")"
            upload_state="$(jq -r '.lastAsyncUploadState // empty' <<<"$status_response")"

            if [[ "$upload_state" == "FAILURE" ]]; then
              echo "Chrome upload status check failed." >&2
              jq 'del(.publicKey)' <<<"$status_response" >&2
              exit 1
            fi

            # lastAsyncUploadState is only present for recent async uploads.
            # If it is missing, proceed to publish and let that endpoint return
            # a more specific error if the item is not yet ready.
            if [[ -z "$upload_state" ]]; then
              upload_state="SUCCESS"
              break
            fi
          done

          if [[ "$upload_state" != "SUCCESS" ]]; then
            echo "Chrome upload did not reach SUCCESS within the polling window." >&2
            exit 1
          fi

          publish_response="$(chrome_api_request POST "$publish_url")"
          item_state="$(jq -r '.itemState // empty' <<<"$publish_response")"
          if [[ -z "$item_state" ]]; then
            echo "Chrome publish response did not include an item state." >&2
            echo "$publish_response" >&2
            exit 1
          fi

          echo "Chrome Web Store publish result: $item_state"

      - name: Publish to Firefox Add-ons
        uses: browser-actions/release-firefox-addon@v0.2.1
        with:
          addon-id: ${{ secrets.FIREFOX_ADDON_ID }}
          addon-path: dist/service-fabric-explorer-helper-${{ needs.package.outputs.version }}-firefox.zip
          source-path: dist/service-fabric-explorer-helper-${{ needs.package.outputs.version }}-firefox-source.zip
          approval-note: |
            This add-on is submitted for public listing on AMO.
            No build step is required. The extension source is plain JavaScript in the repository root.
            The Firefox package is built directly from manifest.json, content-script.js, sfx-core.js,
            sfx-modal.js, sfx-api.js, sfx-ui.js, README.md, and PRIVACY-POLICY.md.
          channel: listed
          auth-api-issuer: ${{ secrets.FIREFOX_JWT_ISSUER }}
          auth-api-secret: ${{ secrets.FIREFOX_JWT_SECRET }}
