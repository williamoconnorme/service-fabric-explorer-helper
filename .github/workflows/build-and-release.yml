name: Build and Release Browser Extensions

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package Extensions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve build version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(jq -r '.version' manifest.json)"
          fi

          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Unable to determine extension version."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set manifest version from tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg version "$VERSION" '.version = $version' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Package extensions
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          FILES="manifest.json content-script.js sfx-core.js sfx-modal.js sfx-api.js sfx-ui.js README.md PRIVACY-POLICY.md"
          zip -r "dist/service-fabric-explorer-helper-${VERSION}-chrome.zip" $FILES
          zip -r "dist/service-fabric-explorer-helper-v${VERSION}.xpi" $FILES

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-packages
          path: |
            dist/*.zip
            dist/*.xpi

      - name: Attach assets to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/service-fabric-explorer-helper-${{ steps.version.outputs.version }}-chrome.zip
            dist/service-fabric-explorer-helper-v${{ steps.version.outputs.version }}.xpi
